{% extends "base.html" %}
{% block title %}Anmelden — Wahlkampf{% endblock %}
{% block body %}
<header>
  <h1>Wahlkampf</h1>
</header>
<div class="card" style="max-width: 400px; margin: 0 auto;">
  <h2 style="margin-top:0;">Anmelden</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if info %}<div class="info">{{ info }}</div>{% endif %}
  <form method="post" action="/login">
    <label for="username">Benutzername</label>
    <input id="username" name="username" type="text" autocomplete="username" required placeholder="Dein Benutzername aus der Registrierung">
    <label for="password">Passwort</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <p style="margin-top:1.25rem;">
      <button type="submit" class="btn">Einloggen</button>
    </p>
  </form>
  <p class="muted" style="margin-bottom:0;">Noch kein Konto? <a href="/registrierung">Registrieren</a></p>
</div>
{% endblock %}
